<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SiteTrack — Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0d0f14;--surface:#13161e;--surface2:#1a1e29;--border:#2a2f3f;
    --accent:#f0c040;--accent2:#4a9eff;--accent3:#00ff9d;
    --text:#d0d8f0;--muted:#5a6180;--danger:#ff3b5c;--warn:#ffb800;--success:#3dd68c;
    --r:6px;--fh:'Rajdhani',sans-serif;--fm:'Share Tech Mono',monospace;--fb:'Exo 2',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;
    background-image:radial-gradient(ellipse at 80% 0%,rgba(61,214,140,.05) 0%,transparent 60%),
    radial-gradient(ellipse at 20% 100%,rgba(240,192,64,.05) 0%,transparent 60%);}
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2.5rem;width:100%;max-width:400px;}
  .login-logo{font-family:var(--fh);font-size:1.8rem;font-weight:700;letter-spacing:3px;color:var(--accent3);text-transform:uppercase;text-align:center;margin-bottom:.25rem;}
  .login-logo span{color:var(--muted);font-weight:400;}
  .login-sub{font-family:var(--fm);font-size:.72rem;letter-spacing:2px;color:var(--muted);text-align:center;margin-bottom:2rem;text-transform:uppercase;}
  .login-fi{display:flex;flex-direction:column;gap:6px;margin-bottom:1.2rem;}
  .login-fi label{font-family:var(--fm);font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
  .login-fi input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:11px 14px;font-family:var(--fb);font-size:.95rem;outline:none;transition:border-color .2s;width:100%;}
  .login-fi input:focus{border-color:var(--accent3);}
  .login-btn{width:100%;font-family:var(--fh);font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:var(--accent3);color:#000;border:none;padding:12px;border-radius:var(--r);cursor:pointer;transition:all .2s;margin-top:.5rem;}
  .login-btn:hover{opacity:.85;}
  .login-err{font-family:var(--fm);font-size:.75rem;color:var(--danger);text-align:center;margin-top:.75rem;min-height:1rem;}
  #app-screen{display:none;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
  .logo-link{text-decoration:none;}
  .logo{font-family:var(--fh);font-size:1.4rem;font-weight:700;letter-spacing:2px;color:var(--accent3);text-transform:uppercase;cursor:pointer;}
  .logo span{color:var(--muted);font-weight:400;}
  .logo:hover{opacity:.8;}
  .vtag{font-family:var(--fm);font-size:.68rem;letter-spacing:2px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;}
  .hright{display:flex;align-items:center;gap:1rem;}
  .user-info{font-family:var(--fm);font-size:.75rem;color:var(--muted);}
  .user-info strong{color:var(--accent3);}
  .btn-logout{font-family:var(--fm);font-size:.75rem;background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:var(--r);cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s;}
  .btn-logout:hover{border-color:var(--danger);color:var(--danger);}
  .bref{font-family:var(--fh);font-size:.9rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;background:transparent;border:1px solid var(--accent3);color:var(--accent3);padding:7px 20px;border-radius:var(--r);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;}
  .bref:hover{background:rgba(0,255,157,.08);}
  .bref.loading .ri{animation:spin .8s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .content{padding:2rem;max-width:1400px;margin:0 auto;}

  /* STATS */
  .srow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem;}
  .sc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.2rem 1.4rem;}
  .sl{font-family:var(--fm);font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  .sv{font-family:var(--fh);font-size:2rem;font-weight:700;line-height:1;}
  .yellow{color:var(--accent);}.blue{color:var(--accent2);}.green{color:var(--accent3);}.red{color:var(--danger);}

  /* FILTERS */
  .fbar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1.4rem;margin-bottom:1rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;}
  .si{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:8px 12px;font-family:var(--fb);font-size:.85rem;outline:none;}
  .si:focus{border-color:var(--accent3);}
  .si-search{flex:1;min-width:180px;}
  .sf{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:8px 12px;font-family:var(--fb);font-size:.85rem;outline:none;cursor:pointer;}
  .sf option{background:var(--surface2);}
  .btn-export{font-family:var(--fh);font-size:.85rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;background:transparent;border:1px solid var(--accent2);color:var(--accent2);padding:7px 14px;border-radius:var(--r);cursor:pointer;transition:all .2s;white-space:nowrap;}
  .btn-export:hover{background:rgba(74,158,255,.08);}

  /* TABLE */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .ctitle{font-family:var(--fh);font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent3);padding:1.2rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .ctitle::before{content:'';width:3px;height:16px;background:var(--accent3);border-radius:2px;}
  .rcount{margin-left:auto;font-family:var(--fm);font-size:.72rem;color:var(--muted);}
  .tw{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:1100px;}
  thead tr{background:var(--surface2);}
  th{font-family:var(--fm);font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:10px 14px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;}
  th:hover{color:var(--text);}
  th.sa::after{content:' ↑';color:var(--accent3);}
  th.sd::after{content:' ↓';color:var(--accent3);}
  td{padding:9px 14px;border-bottom:1px solid rgba(42,47,63,.5);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,.02);}
  .empty{text-align:center;padding:3rem;color:var(--muted);font-family:var(--fm);font-size:.82rem;}
  .desig-badge{font-family:var(--fm);font-size:.65rem;padding:2px 7px;border-radius:3px;letter-spacing:.5px;}
  .desig-s{background:rgba(74,158,255,.12);color:var(--accent2);border:1px solid rgba(74,158,255,.3);}
  .desig-l{background:rgba(240,192,64,.1);color:var(--accent);border:1px solid rgba(240,192,64,.3);}

  .overlay{display:none;position:fixed;inset:0;background:rgba(13,15,20,.7);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:1rem;}
  .overlay.show{display:flex;}
  .spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent3);border-radius:50%;animation:spin .7s linear infinite;}
  .ltxt{font-family:var(--fm);font-size:.8rem;color:var(--accent3);letter-spacing:2px;}
  #toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent3);color:var(--text);padding:12px 20px;border-radius:var(--r);font-family:var(--fm);font-size:.82rem;opacity:0;transform:translateY(10px);transition:all .3s;z-index:999;pointer-events:none;max-width:320px;}
  #toast.show{opacity:1;transform:translateY(0);}
  #toast.err{border-left-color:var(--danger);}
  @media(max-width:600px){header{padding:0 1rem;}.content{padding:1rem;}}
</style>
</head>
<body>

<div class="overlay" id="overlay"><div class="spin"></div><div class="ltxt">LOADING...</div></div>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Site<span>Track</span></div>
    <div class="login-sub">Viewer Portal</div>
    <div class="login-fi"><label>Username</label><input type="text" id="login-user" placeholder="Enter username" autocomplete="username"/></div>
    <div class="login-fi"><label>Password</label><input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password"/></div>
    <button class="login-btn" id="login-btn-el">Login</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="app-screen">
  <header>
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="sitetrack-index.html" class="logo-link">
        <div class="logo">Site<span>Track</span></div>
      </a>
      <span class="vtag">VIEWER</span>
    </div>
    <div class="hright">
      <div class="user-info">Logged in as <strong id="display-name"></strong></div>
      <button class="bref" id="rbtn" onclick="refreshAll()"><span class="ri">↻</span> Refresh</button>
      <button class="btn-logout" id="btn-logout">Logout</button>
    </div>
  </header>

  <div class="content">
    <!-- STATS -->
    <div class="srow">
      <div class="sc"><div class="sl">Total Entries</div><div class="sv yellow" id="s-total">—</div></div>
      <div class="sc"><div class="sl">Today's Entries</div><div class="sv green" id="s-today">—</div></div>
      <div class="sc"><div class="sl">Skilled Workers</div><div class="sv blue" id="s-skilled">—</div></div>
      <div class="sc"><div class="sl">Labor Workers</div><div class="sv yellow" id="s-labor">—</div></div>
    </div>

    <!-- FILTERS -->
    <div class="fbar">
      <input class="si si-search" id="search" placeholder="Search by name, activity, location, item credited…" oninput="renderTable()"/>
      <select class="sf" id="f-date-filter" onchange="renderTable()"><option value="">All Dates</option></select>
      <select class="sf" id="f-desig" onchange="renderTable()">
        <option value="">All Designations</option>
        <option value="Skilled">Skilled</option>
        <option value="Labor">Labor</option>
      </select>
      <select class="sf" id="f-location" onchange="renderTable()"><option value="">All Locations</option></select>
      <select class="sf" id="f-item-credited" onchange="renderTable()"><option value="">All Items Credited</option></select>
      <button class="btn-export" onclick="exportCSV()">📥 Export CSV</button>
    </div>

    <!-- TABLE -->
    <div class="card">
      <div class="ctitle">Site Activity Log <span class="rcount" id="rcount"></span></div>
      <div class="tw">
        <table id="main-table">
          <thead><tr>
            <th onclick="sort(0)">#</th>
            <th onclick="sort(1)">Date</th>
            <th onclick="sort(2)">Name</th>
            <th onclick="sort(3)">Designation</th>
            <th onclick="sort(4)">Activity</th>
            <th onclick="sort(5)">Location</th>
            <th onclick="sort(6)">Floor</th>
            <th onclick="sort(7)">Qty</th>
            <th onclick="sort(8)">Unit</th>
            <th>Labor Assigned</th>
            <th onclick="sort(10)">Item Credited</th>
          </tr></thead>
          <tbody id="main-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, getDoc, getDocs }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { firebaseConfig } from '../references/firebase-config.js';

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let allData = [];
let sortState = { col: 1, asc: false };

onAuthStateChanged(auth, async user => {
  if (user) {
    const snap = await getDoc(doc(db,'users',user.uid));
    if (!snap.exists()) { await signOut(auth); return; }
    const data = snap.data();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display   = 'block';
    document.getElementById('display-name').textContent   = data.username || user.email;
    await refreshAll();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display   = 'none';
  }
});

document.getElementById('login-btn-el').addEventListener('click', async () => {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const errEl    = document.getElementById('login-err');
  const btn      = document.getElementById('login-btn-el');
  errEl.textContent = '';
  if (!username||!password) { errEl.textContent='Please enter username and password.'; return; }
  btn.textContent='Logging in...'; btn.disabled=true;
  try {
    await signInWithEmailAndPassword(auth, username.toLowerCase()+'@equiptrack.app', password);
  } catch(e) {
    if(e.code==='auth/invalid-credential'||e.code==='auth/user-not-found'||e.code==='auth/wrong-password'){
      errEl.textContent='Invalid username or password.';
    } else if(e.code==='auth/network-request-failed'){
      errEl.textContent='Network error. Check your connection.';
    } else { errEl.textContent='Login failed: '+e.message; }
  } finally { btn.textContent='Login'; btn.disabled=false; }
});

document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

window.refreshAll = async function() {
  const btn=document.getElementById('rbtn'), ov=document.getElementById('overlay');
  btn.classList.add('loading'); ov.classList.add('show');
  try {
    const snap = await getDocs(collection(db,'siteActivities'));
    allData = snap.docs.map(d=>({id:d.id,...d.data()}));
    populateFilters();
    updateStats();
    renderTable();
  } catch(e) { toast('Failed to load data.',true); }
  finally { btn.classList.remove('loading'); ov.classList.remove('show'); }
};

function populateFilters() {
  const dates  = [...new Set(allData.map(d=>d.date).filter(Boolean))].sort().reverse();
  const locs   = [...new Set(allData.map(d=>d.location).filter(Boolean))].sort();
  const items  = [...new Set(allData.map(d=>d.itemCredited).filter(Boolean))].sort();
  document.getElementById('f-date-filter').innerHTML  = '<option value="">All Dates</option>'          + dates.map(d=>`<option>${d}</option>`).join('');
  document.getElementById('f-location').innerHTML     = '<option value="">All Locations</option>'       + locs.map(l=>`<option>${l}</option>`).join('');
  document.getElementById('f-item-credited').innerHTML= '<option value="">All Items Credited</option>'  + items.map(i=>`<option>${i}</option>`).join('');
}

function updateStats() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('s-total').textContent   = allData.length;
  document.getElementById('s-today').textContent   = allData.filter(d=>d.date===today).length;
  document.getElementById('s-skilled').textContent = allData.filter(d=>d.designation==='Skilled').length;
  document.getElementById('s-labor').textContent   = allData.filter(d=>d.designation==='Labor').length;
}

window.renderTable = function() {
  const q     = document.getElementById('search').value.toLowerCase();
  const date  = document.getElementById('f-date-filter').value;
  const desig = document.getElementById('f-desig').value;
  const loc   = document.getElementById('f-location').value;
  const item  = document.getElementById('f-item-credited').value;

  let data = allData.filter(d => {
    const matchQ = [d.name,d.activity,d.location,d.floorLevel,d.labor,d.itemCredited].join(' ').toLowerCase().includes(q);
    const matchD  = !date  || d.date===date;
    const matchDg = !desig || d.designation===desig;
    const matchL  = !loc   || d.location===loc;
    const matchI  = !item  || d.itemCredited===item;
    return matchQ && matchD && matchDg && matchL && matchI;
  });

  const ss   = sortState;
  const keys = ['id','date','name','designation','activity','location','floorLevel','quantity','unit','labor','itemCredited'];
  if (ss.col>=0 && ss.col<keys.length) {
    data.sort((a,b) => {
      const av=String(a[keys[ss.col]]||'').toLowerCase(), bv=String(b[keys[ss.col]]||'').toLowerCase();
      return ss.asc ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }

  document.getElementById('rcount').textContent = data.length+' records';
  const tb = document.getElementById('main-tbody');
  if (!data.length) { tb.innerHTML='<tr><td colspan="11"><div class="empty">NO RECORDS FOUND</div></td></tr>'; return; }
  tb.innerHTML = data.map((d,i) => `
    <tr>
      <td style="font-family:var(--fm);color:var(--muted);font-size:.75rem">${i+1}</td>
      <td style="font-family:var(--fm);font-size:.78rem;color:var(--accent)">${d.date||'—'}</td>
      <td>${d.name||'—'}</td>
      <td><span class="desig-badge ${d.designation==='Skilled'?'desig-s':'desig-l'}">${d.designation||'—'}</span></td>
      <td>${d.activity||'—'}</td>
      <td>${d.location||'—'}</td>
      <td>${d.floorLevel||'—'}</td>
      <td style="font-family:var(--fm)">${d.quantity||'—'}</td>
      <td style="font-family:var(--fm);font-size:.78rem;color:var(--accent3)">${d.unit||'—'}</td>
      <td style="max-width:180px;word-break:break-word;font-size:.78rem">${d.labor||'—'}</td>
      <td style="font-family:var(--fm);font-size:.78rem;color:var(--accent2)">${d.itemCredited||'—'}</td>
    </tr>`).join('');
};

window.sort = function(col) {
  const ss = sortState;
  if (ss.col===col) ss.asc=!ss.asc; else { ss.col=col; ss.asc=true; }
  document.getElementById('main-table').querySelectorAll('th').forEach((th,i)=>{
    th.classList.remove('sa','sd');
    if(i===col) th.classList.add(ss.asc?'sa':'sd');
  });
  renderTable();
};

window.exportCSV = function() {
  if (!allData.length) { toast('No data to export.',true); return; }
  const headers = ['Date','Name','Designation','Activity','Location','Floor Level','Quantity','Unit','Labor Assigned','Item Credited'];
  const rows = allData.map(d=>[d.date,d.name,d.designation,d.activity,d.location,d.floorLevel,d.quantity||'',d.unit||'',d.labor,d.itemCredited||'']);
  const csv  = [headers,...rows].map(r=>r.map(c=>'"'+(c||'').toString().replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `sitetrack-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  toast('Exported!');
};

function toast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show'+(err?' err':'');
  setTimeout(()=>t.className='',3500);
}
</script>
</body>
</html>
