<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SiteTools</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0d0f14;--surface:#13161e;--border:#2a2f3f;
    --accent:#00c2ff;--accent3:#00ff9d;--accent4:#c084fc;--accent5:#f0c040;
    --text:#d0d8f0;--muted:#5a6180;
    --fh:'Rajdhani',sans-serif;--fm:'Share Tech Mono',monospace;--fb:'Exo 2',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:2rem;
    background-image:radial-gradient(ellipse at 20% 0%,rgba(0,194,255,.06) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(192,132,252,.05) 0%,transparent 60%);}
  .container{width:100%;max-width:480px;}
  .logo{font-family:var(--fh);font-size:2.5rem;font-weight:700;letter-spacing:4px;color:var(--accent);text-transform:uppercase;text-align:center;margin-bottom:.5rem;}
  .logo span{color:var(--muted);font-weight:400;}
  .sub{font-family:var(--fm);font-size:.75rem;letter-spacing:2px;color:var(--muted);text-align:center;margin-bottom:3rem;text-transform:uppercase;}
  .cards{display:flex;flex-direction:column;gap:1rem;}
  .portal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.5rem 2rem;text-decoration:none;color:var(--text);transition:all .2s;display:flex;align-items:center;gap:1.2rem;}
  .portal:hover{border-color:var(--portal-color);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3);}
  .portal-icon{font-size:1.8rem;flex-shrink:0;}
  .portal-name{font-family:var(--fh);font-size:1.2rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--portal-color);margin-bottom:.2rem;}
  .portal-desc{font-family:var(--fm);font-size:.72rem;color:var(--muted);letter-spacing:.5px;}
  .area{--portal-color:var(--accent);}
  .volume{--portal-color:var(--accent4);}
  .back-btn{display:flex;align-items:center;gap:8px;font-family:var(--fm);font-size:.72rem;color:var(--muted);text-decoration:none;letter-spacing:1px;text-transform:uppercase;margin-bottom:2rem;transition:color .2s;}
  .back-btn:hover{color:var(--text);}
  .footer{font-family:var(--fm);font-size:.68rem;color:var(--muted);text-align:center;margin-top:2.5rem;letter-spacing:1px;}
</style>
</head>
<body>
<div class="container">
  <a href="../index.html" class="back-btn">← Back to Systems</a>
  <div class="logo">Site<span>Tools</span></div>
  <div class="sub">Engineering Computation Tools</div>
  <div class="cards">
    <a href="area-tools.html" class="portal area">
      <div class="portal-icon">📐</div>
      <div>
        <div class="portal-name">Area Calculator</div>
        <div class="portal-desc">Plot polygon by direction and length, compute area</div>
      </div>
    </a>
    <a href="volume-tools.html" class="portal volume">
      <div class="portal-icon">🧱</div>
      <div>
        <div class="portal-name">Structure Volume Monitoring</div>
        <div class="portal-desc">Tabulate and monitor concrete volumes for beams, columns, footings and more</div>
      </div>
    </a>
  </div>
  <div class="footer">ARDZ Construction · SiteTools v1.0</div>
</div>
</body>
</html>
